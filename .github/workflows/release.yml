name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            ext: .exe
            archive: zip
          - goos: linux
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            ext: ""
            archive: tar.gz

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o "dist/atlassian-mcp-extensions${{ matrix.ext }}" .

      - name: Package zip
        if: matrix.archive == 'zip'
        run: |
          cd dist
          zip "atlassian-mcp-extensions-${{ matrix.goos }}-${{ matrix.goarch }}.zip" "atlassian-mcp-extensions${{ matrix.ext }}"

      - name: Package tar.gz
        if: matrix.archive == 'tar.gz'
        run: |
          cd dist
          tar -czf "atlassian-mcp-extensions-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" "atlassian-mcp-extensions${{ matrix.ext }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: atlassian-mcp-extensions-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/atlassian-mcp-extensions-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive }}

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
